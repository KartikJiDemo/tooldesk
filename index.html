<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ToolDesk - Coming Soon</title>
    <meta name="description" content="ToolDesk is coming soon." />
    <style>
      :root {
        color-scheme: dark;
        --bg: #030303;
        --text: #f7f3eb;
        --muted: #9d968d;
        --line: rgba(255, 255, 255, 0.14);
        --accent: #d9b25f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 50% 20%, #111 0%, var(--bg) 34rem);
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        text-align: center;
      }

      .wrap {
        width: min(100%, 680px);
      }

      .gears {
        position: relative;
        width: 118px;
        height: 88px;
        margin: 0 auto 30px;
      }

      .gear {
        position: absolute;
        display: grid;
        place-items: center;
        border-radius: 50%;
        color: var(--accent);
        font-size: 64px;
        line-height: 1;
        text-shadow:
          0 1px 0 rgba(255, 255, 255, 0.18),
          0 16px 34px rgba(0, 0, 0, 0.55);
        animation: spin 6s linear infinite;
      }

      .gear.small {
        right: 0;
        bottom: 2px;
        color: #f2f0eb;
        font-size: 44px;
        animation-duration: 4.5s;
        animation-direction: reverse;
      }

      .gear::before {
        content: "⚙";
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .status {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        padding: 0 16px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--accent);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.12),
          0 18px 36px rgba(0, 0, 0, 0.35);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 22px 0 0;
        font-size: clamp(4rem, 13vw, 8.8rem);
        line-height: 0.9;
        letter-spacing: 0;
      }

      h2 {
        margin: 18px 0 0;
        color: var(--muted);
        font-size: clamp(2rem, 7vw, 4.8rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .note {
        position: fixed;
        right: 18px;
        bottom: 14px;
        margin: 0;
        color: #77716a;
        font-size: 0.72rem;
      }

      @media (max-width: 520px) {
        main {
          align-items: start;
          padding-top: 84px;
        }

        .gears {
          margin-bottom: 26px;
        }

        .note {
          right: 14px;
          bottom: 12px;
          font-size: 0.68rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="wrap" aria-label="ToolDesk coming soon">
        <div class="gears" aria-hidden="true">
          <span class="gear"></span>
          <span class="gear small"></span>
        </div>
        <div class="status">Under Construction</div>
        <h1>ToolDesk</h1>
        <h2>Coming Soon</h2>
        <p class="note">* Temporarily made by Codex</p>
      </section>
    </main>
  </body>
</html>
